<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="wrapper">
    <div class="calc">
      <div class="display">
        <div id="expression" class="expression"></div>
        <div id="result" class="result">0</div>
      </div>

      <div class="grid">
        <button class="btn btn-fn" data-action="clear">AC</button>
        <button class="btn btn-fn" data-action="sign">+/−</button>
        <button class="btn btn-fn" data-action="percent">%</button>
        <button class="btn btn-op" data-action="operator" data-val="/">÷</button>

        <button class="btn btn-num" data-action="number" data-val="7">7</button>
        <button class="btn btn-num" data-action="number" data-val="8">8</button>
        <button class="btn btn-num" data-action="number" data-val="9">9</button>
        <button class="btn btn-op" data-action="operator" data-val="*">×</button>

        <button class="btn btn-num" data-action="number" data-val="4">4</button>
        <button class="btn btn-num" data-action="number" data-val="5">5</button>
        <button class="btn btn-num" data-action="number" data-val="6">6</button>
        <button class="btn btn-op" data-action="operator" data-val="-">−</button>

        <button class="btn btn-num" data-action="number" data-val="1">1</button>
        <button class="btn btn-num" data-action="number" data-val="2">2</button>
        <button class="btn btn-num" data-action="number" data-val="3">3</button>
        <button class="btn btn-op" data-action="operator" data-val="+">+</button>

        <button class="btn btn-num btn-zero" data-action="number" data-val="0">0</button>
        <button class="btn btn-num" data-action="decimal">.</button>
        <button class="btn btn-eq" data-action="equals">=</button>
      </div>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
